<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5b4fe8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('iron-legends-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t;
            document.documentElement.style.colorScheme = t;
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Iron Legends — public reference for Dorian Yates Blood &amp; Guts, Mike Mentzer Heavy Duty, Ronnie Coleman powerbuilding, and Greg Doucette HTLT. Full training plans with warm-ups, working sets, and failure protocols." />
    <title>Iron Legends — Training Methodologies &amp; Plans</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
