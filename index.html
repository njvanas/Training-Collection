<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1512" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c0b0a" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('iron-legends-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t;
            document.documentElement.style.colorScheme = t;
          }
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="Iron Legends — search bodybuilding legends, read their methodologies, and browse full training routines with warm-ups, working sets, and failure protocols."
    />
    <title>Iron Legends — Bodybuilding Methodologies &amp; Workouts</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
